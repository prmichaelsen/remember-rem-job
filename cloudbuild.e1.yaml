steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-rem-job-e1:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-rem-job-e1:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-rem-job-e1:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-rem-job-e1:latest'

  # Deploy as Cloud Run Job
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'remember-rem-job-e1'
      - '--image=gcr.io/$PROJECT_ID/remember-rem-job-e1:$COMMIT_SHA'
      - '--region=us-central1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--task-timeout=3000s'
      - '--max-retries=0'
      - '--set-env-vars=NODE_ENV=production,LOG_LEVEL=debug'
      - '--update-secrets=WEAVIATE_REST_URL=remember-e1-weaviate-rest-url:latest,WEAVIATE_GRPC_URL=remember-e1-weaviate-grpc-url:latest,WEAVIATE_API_KEY=remember-e1-weaviate-api-key:latest,FIREBASE_PROJECT_ID=remember-e1-firebase-project-id:latest,FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY=remember-e1-firebase-admin-service-account-key:latest,EMBEDDINGS_PROVIDER=remember-e1-embeddings-provider:latest,EMBEDDINGS_MODEL=remember-e1-embeddings-model:latest,EMBEDDINGS_API_KEY=remember-e1-openai-embeddings-api-key:latest,ANTHROPIC_API_KEY=remember-e1-anthropic-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/remember-rem-job-e1:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/remember-rem-job-e1:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

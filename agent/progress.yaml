project:
  name: remember-rem-job
  version: 0.1.0
  started: 2026-03-02
  status: in_progress
  description: |
    Thin Cloud Run Job wrapper around remember-core's RemService.
    Triggered hourly by GCP Cloud Scheduler, calls RemService to discover
    and create relationships between memories using embedding similarity
    and Haiku validation.

